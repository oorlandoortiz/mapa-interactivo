<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa interactivo – Activos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  display: flex;
}

/* SIDEBAR */
#sidebar {
  width: 260px;
  background: #020617;
  padding: 14px;
  border-right: 1px solid #1e293b;
  overflow-y: auto;
}

/* MAPA */
#map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  touch-action: none;
}

/* FILTROS */
#filters {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: #020617;
  padding: 8px;
  border-radius: 6px;
  font-size: 13px;
}

/* ZOOM */
#zoom-controls {
  position: absolute;
  right: 14px;
  bottom: 14px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

#zoom-controls button {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  border: none;
  background: #1e293b;
  color: #fff;
  font-size: 18px;
}

/* SVG */
svg {
  width: 100%;
  height: 100%;
  cursor: grab;
  user-select: none;
}

/* ACTIVOS */
.asset {
  cursor: pointer;
  transition: filter 0.15s;
}

.asset:hover,
.asset.selected {
  filter:
    drop-shadow(0 0 6px #fff)
    drop-shadow(0 0 14px #38bdf8)
    drop-shadow(0 0 26px #38bdf8);
}

/* TOOLTIP */
#tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(2,6,23,0.95);
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 12px;
  display: none;
  z-index: 20;
}
</style>
</head>

<body>

<div id="sidebar">
  <h3>Detalle del activo</h3>
  <div id="info">Selecciona un activo</div>
</div>

<div id="map-container">

  <div id="filters">
    <strong>Filtros</strong><br>
    <label><input type="checkbox" checked data-filter="tablero"> Tableros</label>
  </div>

  <div id="zoom-controls">
    <button id="zoom-in">+</button>
    <button id="zoom-out">−</button>
    <button id="zoom-reset">⛶</button>
  </div>

  <div id="tooltip"></div>

  <svg id="map" viewBox="0 0 800 500">
    <image href="plano.jpg" x="0" y="0" width="800" height="500" />
    <g id="layer-tableros"></g>
  </svg>

</div>

<script>
/* ================= CONFIG MAPA ================= */
const MAP_WIDTH = 800;
const MAP_HEIGHT = 500;
const MIN_ZOOM = 1;
const MAX_ZOOM = 4;

/* ================= TABLEROS ================= */
const tableros = [
  { id: "TAB-01-D5", nombre: "Tablero Línea D5", x: 385, y: 300 },
  { id: "TAB-02-S1", nombre: "Tablero Línea S1", x: 385, y: 270 },
  { id: "TAB-03-S3", nombre: "Tablero Línea S3", x: 385, y: 250 },
  { id: "TAB-04-R1", nombre: "Tablero Línea R1", x: 385, y: 230 },
];

/* ================= VARIABLES ================= */
const svg = document.getElementById("map");
const info = document.getElementById("info");
const tooltip = document.getElementById("tooltip");
const layerTableros = document.getElementById("layer-tableros");

let vb = { x: 0, y: 0, w: 800, h: 500 };
let dragging = false;
let start = { x: 0, y: 0 };

/* ================= RENDER TABLEROS ================= */
const iconSize = 15;
tableros.forEach(tab => {
  const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
  img.setAttribute("href", "electrico.png");
  img.setAttribute("width", iconSize);
  img.setAttribute("height", iconSize);
  img.setAttribute("x", tab.x - iconSize / 2);
  img.setAttribute("y", tab.y - iconSize / 2);
  img.classList.add("asset", "tablero");

  img.dataset.id = tab.id;
  img.dataset.type = "Tablero eléctrico";
  img.dataset.info = tab.nombre;

  img.addEventListener("pointerdown", e => {
    e.stopPropagation();
    document.querySelectorAll(".asset").forEach(a => a.classList.remove("selected"));
    img.classList.add("selected");
    info.innerHTML = `<strong>${tab.id}</strong><br>${tab.nombre}`;
  });

  layerTableros.appendChild(img);
});

/* ================= VIEWBOX ================= */
function clampViewBox() {
  vb.w = Math.max(MAP_WIDTH / MAX_ZOOM, Math.min(MAP_WIDTH / MIN_ZOOM, vb.w));
  vb.h = vb.w * MAP_HEIGHT / MAP_WIDTH;
  vb.x = Math.max(0, Math.min(MAP_WIDTH - vb.w, vb.x));
  vb.y = Math.max(0, Math.min(MAP_HEIGHT - vb.h, vb.y));
}

function updateVB() {
  clampViewBox();
  svg.setAttribute("viewBox", `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
}

/* ================= PAN (1 DEDO) ================= */
svg.addEventListener("pointerdown", e => {
  dragging = true;
  start.x = e.clientX;
  start.y = e.clientY;
});

window.addEventListener("pointermove", e => {
  if (!dragging || pointers.size > 1) return;
  const dx = (start.x - e.clientX) * (vb.w / svg.clientWidth);
  const dy = (start.y - e.clientY) * (vb.h / svg.clientHeight);
  vb.x += dx;
  vb.y += dy;
  start.x = e.clientX;
  start.y = e.clientY;
  updateVB();
});

window.addEventListener("pointerup", () => dragging = false);

/* ================= BOTONES ZOOM ================= */
document.getElementById("zoom-in").onclick = () => {
  vb.w *= 0.8;
  vb.h *= 0.8;
  updateVB();
};

document.getElementById("zoom-out").onclick = () => {
  vb.w *= 1.25;
  vb.h *= 1.25;
  updateVB();
};

document.getElementById("zoom-reset").onclick = () => {
  vb = { x: 0, y: 0, w: 800, h: 500 };
  updateVB();
};

/* ================= PINCH ZOOM (2 DEDOS iPAD) ================= */
let pointers = new Map();
let lastDistance = null;

svg.addEventListener("pointerdown", e => pointers.set(e.pointerId, { x: e.clientX, y: e.clientY }));
svg.addEventListener("pointerup", e => { pointers.delete(e.pointerId); lastDistance = null; });
svg.addEventListener("pointercancel", () => { pointers.clear(); lastDistance = null; });

svg.addEventListener("pointermove", e => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size !== 2) return;

  const pts = Array.from(pointers.values());
  const dx = pts[0].x - pts[1].x;
  const dy = pts[0].y - pts[1].y;
  const dist = Math.hypot(dx, dy);

  if (!lastDistance) { lastDistance = dist; return; }

  let factor = lastDistance / dist;
  factor = Math.min(1.08, Math.max(0.92, factor));

  const rect = svg.getBoundingClientRect();
  const cx = ((pts[0].x + pts[1].x) / 2 - rect.left) / rect.width * vb.w + vb.x;
  const cy = ((pts[0].y + pts[1].y) / 2 - rect.top) / rect.height * vb.h + vb.y;

  vb.w *= factor;
  vb.x = cx - vb.w / 2;
  vb.y = cy - vb.h / 2;

  updateVB();
  lastDistance = dist;
});
</script>

</body>
</html>
